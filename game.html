<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musitechne - Rhythm Game</title>
    <!-- Подключаем отдельный CSS для игры -->
    <link rel="stylesheet" href="css/game.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    
    <!-- 1. Экран выбора уровней -->
    <div id="screen-level-select" class="screen active">
        <h1>Выберите трек</h1>
        <ul id="level-list" class="level-list">
            <!-- Сюда вставим уровни из JS -->
        </ul>
        <button id="btn-back-menu" class="btn">В главное меню</button>
    </div>

    <!-- 2. Игровой экран (Canvas и Интерфейс) -->
    <div id="screen-game" class="screen">
        <!-- Маскот на заднем фоне (чуть тусклый, чтобы не мешал нотам) -->
        <img id="game-mascot" src="assets/characters/djkin/djkin_1.png" alt="DJ Mascot">
        
        <div class="hud">
            <div class="score">Счет: <span id="score-display">0</span></div>
            <div class="hp-bar-container">
                <div id="hp-bar" class="hp-bar"></div>
            </div>
            <span id="combo-display">Combo: 0</span>
        </div>

        <!-- Здесь падают ноты -->
        <canvas id="game-canvas"></canvas>

        <!-- Пианино (5 клавиш) -->
        <div class="piano-overlay" id="piano-overlay">
            <div class="key" data-note="C4" data-lane="0">C<br>(Q)</div>
            <div class="key" data-note="D4" data-lane="1">D<br>(W)</div>
            <div class="key" data-note="E4" data-lane="2">E<br>(E)</div>
            <div class="key" data-note="F4" data-lane="3">F<br>(R)</div>
            <div class="key" data-note="G4" data-lane="4">G<br>(T)</div>
        </div>
    </div>

    <!-- 3. Экран результата (Победа/Поражение) -->
    <div id="screen-result" class="screen">
        <img id="result-mascot" src="" alt="Result Mascot">
        <h1 id="result-title">Результат</h1>
        <p>Итоговый счет: <span id="result-score">0</span></p>
        <button id="btn-retry" class="btn">Играть снова</button>
        <button id="btn-levels" class="btn">Выбрать другой уровень</button>
    </div>

    <!-- Логика игры -->
    <script src="js/game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musitechne - Main Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Слой затемнения/осветления для фона -->
    <div class="theme-overlay"></div>

    <!-- Кнопка смены темы (справа сверху) -->
    <button id="theme-toggle" class="theme-btn">
        <img src="assets/images/dark.png" id="theme-icon" alt="Toggle Theme">
    </button>

    <main class="menu-layout">
        <!-- Левая часть: Кнопка Старт -->
        <div class="left-section">
            <button id="btn-start" class="start-btn">
                <img src="assets/images/start.png" alt="Start Game">
            </button>
        </div>

        <!-- Правая часть: Маскот и Диалоговое окно -->
        <div class="right-section">
            <div class="mascot-container">
                <img src="assets/characters/djkin/djkin_hello.png" id="djkin-mascot" alt="DJ Kin">
                
                <div id="dialogue-box" class="dialogue-box">
                    <!-- Заглушка для PNG окошка через background-image в CSS -->
                    <p id="dialogue-text"></p>
                    <span class="blinking-cursor">_</span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/menu.js"></script>
</body>
</html>
